<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Document Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark">
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>📄 DocBot</h2>
      <p class="tagline">Ask questions from your documents.</p>
      <nav>
        <button class="nav-btn active">Chat</button>
      </nav>
    </aside>

    <!-- Main Chat Area -->
    <main id="chat-area">
      <header>
        <h1>📝 Document ChatBot</h1>
        <button id="theme-toggle">☀️</button>
      </header>

      <!-- File Upload Section -->
      <section id="upload-section">
        <div class="upload-container">
          <input type="file" id="file-input" accept=".txt,.pdf,.docx" />
          <button id="upload-btn">Upload Document</button>
          <span id="file-status"></span>
        </div>
        
        <!-- Mode Selection -->
        <div class="mode-selector" id="mode-selector" style="display: none;">
          <label>
            <input type="radio" name="mode" value="ask" checked> Ask Questions
          </label>
          <label>
            <input type="radio" name="mode" value="summarize"> Summarize Document
          </label>
        </div>
      </section>

      <section id="chat-container">
        <div id="chat-box"></div>
      </section>

      <footer>
        <div id="input-container" style="display: none;">
          <input type="text" id="user-input" placeholder="Type your question..." />
          <button id="send-btn">Send</button>
          <button id="summarize-btn" style="display: none;">Summarize</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
